# Build Native Shell - v1.1.5 (Repaired GH Actions)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Build Native Libraries
      run: |
        # Use default NDK path for Ubuntu 22.04
        # NDK 25.2.9519653 is standard on GH Actions
        $ANDROID_SDK_ROOT/ndk/25.2.9519653/ndk-build -C app/src/main/cpp NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk APP_ABI="arm64-v8a armeabi-v7a"

    - name: Build Android App
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LUXPRO-Release
        path: app/build/outputs/apk/release/*.apk
