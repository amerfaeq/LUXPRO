name: Build Native Shell

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android NDK
      uses: nwasisto/setup-android-ndk@v1
      with:
        ndk-version: r25b

    - name: Build Native Libraries
      run: |
        cd app/src/main/cpp
        $ANDROID_NDK_HOME/ndk-build APP_BUILD_SCRIPT=Android.mk APP_ABI="arm64-v8a armeabi-v7a"

    - name: Build Android App
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: LUXPRO-Release
        path: app/build/outputs/apk/release/*.apk
