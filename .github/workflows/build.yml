# Build Native Shell - v1.1.5 (Repaired GH Actions)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android NDK
      run: |
        echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk-bundle" >> $GITHUB_ENV
        echo "/usr/local/lib/android/sdk/ndk-bundle" >> $GITHUB_PATH

    - name: Build Native Libraries
      run: |
        /usr/local/lib/android/sdk/ndk-bundle/ndk-build -C app/src/main/cpp NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk APP_ABI="arm64-v8a armeabi-v7a"

    - name: Build Android App
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LUXPRO-Release
        path: app/build/outputs/apk/release/*.apk
