# Build Native Shell - v1.1.5 (Repaired GH Actions)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android NDK
      run: |
        # Dynamically find the latest NDK version on the runner
        NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d | sort -V | tail -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "$NDK_PATH" >> $GITHUB_PATH
        echo "Selected NDK: $NDK_PATH"

    - name: Build Native Libraries
      run: |
        ${ANDROID_NDK_HOME}/ndk-build -C app/src/main/cpp NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk APP_ABI="arm64-v8a armeabi-v7a"

    - name: Build Android App
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LUXPRO-Release
        path: app/build/outputs/apk/release/*.apk
